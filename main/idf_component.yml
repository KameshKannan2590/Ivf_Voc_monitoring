## IVF VOC Monitor — managed component dependencies
dependencies:
  idf: ">=5.3.0"

  ## LVGL 8.3.x UI framework
  lvgl/lvgl:
    version: ">=8.3.0,<9.0.0"
    rules:
      - if: "idf_version >= 5.0"

  ## NOTE: espressif/esp_lcd_touch_xpt2046 does NOT exist in the component registry.
  ## XPT2046 touch is implemented as a custom driver in main/touch/touch_driver.c
  ## using the native ESP-IDF spi_master driver — no managed component required.
